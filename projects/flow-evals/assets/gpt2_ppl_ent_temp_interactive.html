<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT-2 Temperature Sweep</title>
  <style>
    :root {
      --blue: #2f6fe4;
      --green: #1f8f5f;
      --flm: #7f4aa0;
      --candi: #c65b63;
      --text: #222;
      --muted: #666;
      --grid: #e8e8e8;
      --border: #d7d7d7;
      font-family: "Open Sans", Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #f7f7f7;
      color: var(--text);
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 22px 24px 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: clamp(1.4rem, 3vw, 2rem);
      line-height: 1.2;
    }

    .chart-wrap {
      position: relative;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .line {
      fill: none;
      stroke-width: 3.2;
    }

    .animate-line,
    .animate-point,
    .reference-label,
    .reference-point,
    .reference-vertical {
      opacity: 0;
    }

    .animate-point,
    .reference-point {
      transform: scale(0.2);
      transform-box: fill-box;
      transform-origin: center;
      transition: opacity 180ms ease-out, transform 220ms cubic-bezier(0.2, 1.5, 0.4, 1);
    }

    .animate-point.visible,
    .reference-point.visible {
      opacity: 1;
      transform: scale(1);
    }

    .reference-label,
    .reference-vertical {
      transition: opacity 260ms ease-out;
    }

    .reference-label.visible,
    .reference-vertical.visible {
      opacity: 1;
    }

    .point {
      cursor: pointer;
    }

    .point circle {
      transition: r 80ms ease-out, filter 80ms ease-out;
    }

    .point:hover circle {
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.25));
    }

    .tooltip {
      position: absolute;
      z-index: 3;
      display: none;
      max-width: 260px;
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.16);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.35;
      pointer-events: none;
    }

    .tooltip.visible {
      display: block;
    }

    .caption {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      main {
        padding: 14px 12px;
      }
    }
  </style>
</head>
<body>
<main>
  <h1>Small Entropy Changes Can Move Generation PPL a Lot</h1>
  <div class="chart-wrap" id="chart-wrap" aria-label="Interactive temperature sweep chart"></div>
  <p class="caption">Generative perplexity (blue) and sample entropy (green) versus temperature. Each point is 128 samples from <code>gpt2-small</code>, generations scored by <code>gpt2-large</code>. Note that gen. ppl scale is logarithmic.</p>
</main>

<script>
  const data = [
    { temperature: 0, genPpl: 1.1191, entropy: 3.0401 },
    { temperature: 0.1, genPpl: 1.1659, entropy: 3.1437 },
    { temperature: 0.2, genPpl: 1.1573, entropy: 3.0851 },
    { temperature: 0.3, genPpl: 1.1927, entropy: 3.1436 },
    { temperature: 0.4, genPpl: 1.3019, entropy: 3.3128 },
    { temperature: 0.5, genPpl: 1.5607, entropy: 3.5249 },
    { temperature: 0.6, genPpl: 2.3834, entropy: 3.9678 },
    { temperature: 0.7, genPpl: 4.8982, entropy: 4.5246 },
    { temperature: 0.8, genPpl: 10.0824, entropy: 4.9776 },
    { temperature: 0.9, genPpl: 27.3548, entropy: 5.3974 },
    { temperature: 0.925, genPpl: 36.7649, entropy: 5.5371 },
    { temperature: 0.95, genPpl: 57.4317, entropy: 5.6613 },
    { temperature: 0.975, genPpl: 89.8616, entropy: 5.8109 },
    { temperature: 1, genPpl: 122.3149, entropy: 5.8842 }
  ];

  const references = [
    { name: "gpt2-small t=1", entropy: 5.88, temperature: 1.000, genPpl: 122.3149, color: "#555555" },
    { name: "CANDI", entropy: 5.71, temperature: 0.958, genPpl: 66.4406, color: "#c65b63" },
    { name: "FLM", entropy: 5.33, temperature: 0.884, genPpl: 23.3050, color: "#7f4aa0" }
  ];

  const colors = {
    genPpl: "#2f6fe4",
    entropy: "#1f8f5f"
  };

  function linearScale(value, inMin, inMax, outMin, outMax) {
    return outMin + (value - inMin) * (outMax - outMin) / (inMax - inMin);
  }

  function logScale(value, inMin, inMax, outMin, outMax) {
    const logMin = Math.log10(inMin);
    const logMax = Math.log10(inMax);
    return outMin + (Math.log10(value) - logMin) * (outMax - outMin) / (logMax - logMin);
  }

  function linePath(points, x, y, key) {
    return points.map((point, index) => {
      const command = index === 0 ? "M" : "L";
      return `${command} ${x(point.temperature).toFixed(2)} ${y(point[key]).toFixed(2)}`;
    }).join(" ");
  }

  function renderChart() {
    const wrap = document.getElementById("chart-wrap");
    const width = 940;
    const height = 540;
    const margin = { top: 28, right: 92, bottom: 66, left: 82 };
    const plotW = width - margin.left - margin.right;
    const plotH = height - margin.top - margin.bottom;

    const x = value => linearScale(value, 0, 1, margin.left, margin.left + plotW);
    const yPpl = value => logScale(value, 1, 150, margin.top + plotH, margin.top);
    const yEntropy = value => linearScale(value, 3, 6, margin.top + plotH, margin.top);
    const xTicks = [0, 0.2, 0.4, 0.6, 0.8, 1];
    const pplTicks = [1, 10, 100];
    const entropyTicks = [3, 3.5, 4, 4.5, 5, 5.5, 6];

    wrap.innerHTML = `
      <svg viewBox="0 0 ${width} ${height}" role="img">
        <rect x="0" y="0" width="${width}" height="${height}" fill="#fff"></rect>

        ${xTicks.map(tick => `<line x1="${x(tick)}" y1="${margin.top}" x2="${x(tick)}" y2="${margin.top + plotH}" stroke="var(--grid)"></line>`).join("")}
        ${pplTicks.map(tick => `<line x1="${margin.left}" y1="${yPpl(tick)}" x2="${margin.left + plotW}" y2="${yPpl(tick)}" stroke="var(--grid)"></line>`).join("")}

        ${references.map(ref => `
          <line class="animate-line reference-entropy-line" data-ref="${ref.name}" x1="${margin.left}" y1="${yEntropy(ref.entropy)}" x2="${margin.left + plotW}" y2="${yEntropy(ref.entropy)}" stroke="${ref.color}" stroke-width="2.1"></line>
          <line class="reference-vertical" data-ref="${ref.name}" x1="${x(ref.temperature)}" y1="${margin.top}" x2="${x(ref.temperature)}" y2="${margin.top + plotH}" stroke="${ref.color}" stroke-width="1.6" stroke-dasharray="2 4" opacity="0.75"></line>
          <text class="reference-label" data-ref="${ref.name}" x="${margin.left + 10}" y="${yEntropy(ref.entropy) - 8}" font-size="17" font-weight="800" fill="${ref.color}">${ref.name} sample entropy = ${ref.entropy.toFixed(2)}</text>
        `).join("")}

        <line x1="${margin.left}" y1="${margin.top + plotH}" x2="${margin.left + plotW}" y2="${margin.top + plotH}" stroke="#222" stroke-width="1.4"></line>
        <line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + plotH}" stroke="#222" stroke-width="1.4"></line>
        <line x1="${margin.left + plotW}" y1="${margin.top}" x2="${margin.left + plotW}" y2="${margin.top + plotH}" stroke="#222" stroke-width="1.4"></line>

        ${xTicks.map(tick => `<text x="${x(tick)}" y="${height - 28}" text-anchor="middle" font-size="17" font-weight="700" fill="#333">${tick.toFixed(1)}</text>`).join("")}
        ${pplTicks.map(tick => `<text x="${margin.left - 12}" y="${yPpl(tick) + 6}" text-anchor="end" font-size="17" font-weight="700" fill="${colors.genPpl}">${tick}</text>`).join("")}
        ${entropyTicks.map(tick => `<text x="${margin.left + plotW + 12}" y="${yEntropy(tick) + 6}" font-size="17" font-weight="700" fill="${colors.entropy}">${tick.toFixed(1)}</text>`).join("")}

        <text x="${margin.left + plotW / 2}" y="${height - 6}" text-anchor="middle" font-size="20" font-weight="800" fill="#222">Sampling Temperature</text>
        <text x="22" y="${margin.top + plotH / 2}" transform="rotate(-90 22 ${margin.top + plotH / 2})" text-anchor="middle" font-size="19" font-weight="800" fill="${colors.genPpl}">Generation PPL (gpt2-large scorer)</text>
        <text x="${width - 18}" y="${margin.top + plotH / 2}" transform="rotate(90 ${width - 18} ${margin.top + plotH / 2})" text-anchor="middle" font-size="19" font-weight="800" fill="${colors.entropy}">Sample Entropy</text>

        <path class="line animate-line" data-series="genPpl" d="${linePath(data, x, yPpl, "genPpl")}" stroke="${colors.genPpl}"></path>
        <path class="line animate-line" data-series="entropy" d="${linePath(data, x, yEntropy, "entropy")}" stroke="${colors.entropy}"></path>

        ${data.map(point => `
          <g class="point" data-kind="Temperature" data-temp="${point.temperature}" data-ppl="${point.genPpl}" data-entropy="${point.entropy}" data-base-r="5.5">
            <circle class="animate-point" data-series="genPpl" cx="${x(point.temperature)}" cy="${yPpl(point.genPpl)}" r="5.5" fill="${colors.genPpl}" stroke="#fff" stroke-width="1.4"></circle>
            <circle class="animate-point" data-series="entropy" cx="${x(point.temperature)}" cy="${yEntropy(point.entropy)}" r="5.5" fill="${colors.entropy}" stroke="#fff" stroke-width="1.4"></circle>
          </g>
        `).join("")}

        ${references.map(ref => `
          <g class="point" data-kind="${ref.name} reference" data-temp="${ref.temperature}" data-ppl="${ref.genPpl}" data-entropy="${ref.entropy}" data-base-r="8">
            <circle class="reference-point" data-ref="${ref.name}" cx="${x(ref.temperature)}" cy="${yPpl(ref.genPpl)}" r="8" fill="${ref.color}" stroke="#fff" stroke-width="1.8"></circle>
          </g>
        `).join("")}
      </svg>
      <div class="tooltip" id="tooltip"></div>
    `;

    const tooltip = document.getElementById("tooltip");
    const positionTooltip = event => {
      const rect = wrap.getBoundingClientRect();
      const offset = 12;
      const maxLeft = rect.width - tooltip.offsetWidth - offset;
      tooltip.style.left = `${Math.min(event.clientX - rect.left + offset, Math.max(offset, maxLeft))}px`;
      tooltip.style.top = `${Math.max(offset, event.clientY - rect.top - tooltip.offsetHeight - offset)}px`;
    };

    wrap.querySelectorAll(".point").forEach(point => {
      const circles = point.querySelectorAll("circle");
      point.addEventListener("mouseenter", event => {
        circles.forEach(circle => circle.setAttribute("r", "8.5"));
        tooltip.innerHTML = `
          ${point.dataset.kind}<br>
          t = ${Number(point.dataset.temp).toFixed(3).replace(/0+$/, "").replace(/\.$/, "")}<br>
          gen. ppl = ${Number(point.dataset.ppl).toFixed(4)}<br>
          entropy = ${Number(point.dataset.entropy).toFixed(4)}
        `;
        tooltip.classList.add("visible");
        positionTooltip(event);
      });
      point.addEventListener("mousemove", positionTooltip);
      point.addEventListener("mouseleave", () => {
        circles.forEach(circle => circle.setAttribute("r", point.dataset.kind.includes("reference") ? "8" : "5.5"));
        tooltip.classList.remove("visible");
        tooltip.textContent = "";
      });
    });

    function drawLine(line, duration) {
      const length = line.getTotalLength();
      line.style.transition = "none";
      line.style.strokeDasharray = `${length} ${length}`;
      line.style.strokeDashoffset = length;
      line.style.opacity = 0;
      line.getBoundingClientRect();
      requestAnimationFrame(() => {
        line.style.opacity = 1;
        line.style.transition = `stroke-dashoffset ${duration}ms ease-out`;
        line.style.strokeDashoffset = 0;
      });
    }

    function revealPoints(points, startDelay = 0, stepDelay = 45) {
      points.forEach((point, index) => {
        setTimeout(() => point.classList.add("visible"), startDelay + index * stepDelay);
      });
    }

    function animateSeries(series, startDelay) {
      setTimeout(() => {
        drawLine(wrap.querySelector(`.animate-line[data-series="${series}"]`), 1400);
        revealPoints([...wrap.querySelectorAll(`.animate-point[data-series="${series}"]`)], 220, 70);
      }, startDelay);
    }

    function animateReference(name, startDelay) {
      setTimeout(() => {
        const horizontalLine = wrap.querySelector(`.reference-entropy-line[data-ref="${name}"]`);
        const verticalLine = wrap.querySelector(`.reference-vertical[data-ref="${name}"]`);
        const label = wrap.querySelector(`.reference-label[data-ref="${name}"]`);
        const point = wrap.querySelector(`.reference-point[data-ref="${name}"]`);

        drawLine(horizontalLine, 1000);
        setTimeout(() => {
          label.classList.add("visible");
          drawLine(verticalLine, 850);
        }, 1000);
        setTimeout(() => {
          point.classList.add("visible");
        }, 1850);
      }, startDelay);
    }

    animateSeries("genPpl", 400);
    animateSeries("entropy", 2300);
    animateReference("gpt2-small t=1", 4300);
    animateReference("CANDI", 6400);
    animateReference("FLM", 8500);
  }

  renderChart();
</script>
</body>
</html>
